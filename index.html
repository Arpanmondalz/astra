<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Astra Telescope</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f7fa;
      color: #1f2937;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      font-weight: 700;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #6b7280;
      margin: 12px auto 40px;
      max-width: 600px;
    }

    figure {
      margin: 0 0 32px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    figcaption {
      padding: 16px 20px;
      font-size: 0.95rem;
      color: #4b5563;
    }

    @media (max-width: 600px) {
      .container {
        padding: 28px 14px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔭 Astra Telescope</h1>
  <p class="subtitle">
    A DIY telescope project and its first successful images of the Moon.
  </p>

  <figure>
    <img src="static/telescope1.png" alt="Astra Telescope">
    <figcaption>
      Completed Astra Telescope mounted and ready for observation.
    </figcaption>
  </figure>

  <figure>
    <img src="static/telescope2.jpeg" alt="Astra Telescope">
    <figcaption>
      Side view of the telescope showing the optical tube assembly.
    </figcaption>
  </figure>

  <figure>
    <img src="static/moon1.jpeg" alt="Moon through Astra Telescope">
    <figcaption>
      First successful lunar image captured through the Astra Telescope.
    </figcaption>
  </figure>

  <figure>
    <img src="static/moon2.jpeg" alt="Moon through Astra Telescope">
    <figcaption>
      Enhanced view revealing additional surface details and craters.
    </figcaption>
  </figure>

  <figure>
    <img src="static/moon3.jpeg" alt="Moon through Astra Telescope">
    <figcaption>
      Another capture showcasing the Moon.
    </figcaption>
  </figure>

</div>

</body>
</html>
